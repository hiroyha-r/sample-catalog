apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: template1
  namespace: templates
  title: Template1
  description: Template 1
  annotations:
    backstage.io/techdocs-ref: dir:./docs4
spec:
  owner: user:default/bkuser1
  type: service

  parameters:
    - title: input1
      required:
        - ownEntity
      properties:
        ownEntity:
          title: target
          type: string
          "ui:field": OwnedEntityPicker
          "ui:options":
            catalogFilter:
            - kind: component
              metadata.namespace: internal-systems
            - kind: component
              metadata.namespace: external-systems
            - kind: component
              metadata.namespace: systems3
            - kind: component
              metadata.namespace: systems4
            - kind: component
              metadata.namespace: systems5
            - kind: component
              metadata.namespace: systems6
  steps:
    - id: fetch
      name: fetch entity
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.ownEntity }}
    - id: debug
      name: debug
      action: debug:log
      input:
        message: ${{ steps.fetch.output.entity.metadata.name }}

  output:
    text:
      - title: Information
        content: |
          ${{ steps.fetch.output.entity.metadata.name }}
---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: template2
  namespace: templates2
  title: Template2
  description: Template 2
spec:
  owner: user:default/bkuser1
  type: service

  parameters:
    - title: input1
      required:
        - appId
      properties:
        appId:
          title: target
          type: string
          "ui:field": OwnerPicker
          "ui:options":
            allowedKinds:
              - Group
  steps:
    - id: debug
      name: debug
      action: debug:log
      input:
        message: ${{ parameters.appId }}

  output:
    text:
      - title: Information
        content: |
          ${{ parameters.appId }}
---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: template3
  namespace: templates3
  title: Template3
  description: Template 3
spec:
  owner: user:default/bkuser1
  type: service

  parameters:
    - title: input1
      required:
        - appId
      properties:
        appId:
          title: target
          type: string
          "ui:field": OwnerPicker
          "ui:options":
            allowArbitraryValues: false
            allowedKinds:
              - Group
  steps:
    - id: debug
      name: debug
      action: debug:log
      input:
        message: ${{ parameters.appId }} 

  output:
    text:
      - title: Information
        content: |
          ${{ parameters.appId }}

